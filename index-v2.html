<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业塔罗解读 - Tarot Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 塔罗引擎 -->
    <script src="./tarot-engine-integrated.js"></script>
    <script src="./tarot-data-human-friendly.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 30%, rgba(157, 133, 196, 0.3), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(247, 231, 206, 0.2), transparent 50%);
            filter: blur(60px);
            animation: auroraShift 20s ease-in-out infinite alternate;
        }
        
        @keyframes auroraShift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }
        
        .card-item {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card-item:hover {
            transform: translateY(-5px) scale(1.05);
        }
        
        .card-item.selected {
            transform: translateY(-10px) scale(1.1);
            border: 3px solid #fbbf24;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.5);
        }
        
        .energy-bar-fill {
            transition: width 1s ease-out;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-warning {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 模拟78张牌数据（实际使用时从数据库加载）
        const generateDeck = () => {
            const cards = [];
            
            // 大阿卡纳
            const majorNames = [
                "愚者", "魔术师", "女祭司", "皇后", "皇帝", "教皇", "恋人",
                "战车", "力量", "隐士", "命运之轮", "正义", "倒吊人", "死神",
                "节制", "恶魔", "高塔", "星星", "月亮", "太阳", "审判", "世界"
            ];
            
            majorNames.forEach((name, index) => {
                cards.push({
                    id: `major_${index}`,
                    name: name,
                    arcana: 'major',
                    suit: null,
                    number: index
                });
            });
            
            // 小阿卡纳
            const suits = ['Wands', 'Cups', 'Swords', 'Pentacles'];
            const suitNames = ['权杖', '圣杯', '宝剑', '星币'];
            
            suits.forEach((suit, suitIndex) => {
                for (let i = 1; i <= 14; i++) {
                    let rankName = i === 1 ? 'Ace' : i <= 10 ? i.toString() : ['侍从', '骑士', '王后', '国王'][i - 11];
                    cards.push({
                        id: `${suit.toLowerCase()}_${i}`,
                        name: `${suitNames[suitIndex]}${rankName}`,
                        arcana: 'minor',
                        suit: suit,
                        number: i
                    });
                }
            });
            
            return cards;
        };
        
        const App = () => {
            const [view, setView] = useState('cover'); // cover, spread, draw, reading
            const [spreadType, setSpreadType] = useState('three_card');
            const [topic, setTopic] = useState('general');
            const [deck, setDeck] = useState([]);
            const [selectedCards, setSelectedCards] = useState([]);
            const [reading, setReading] = useState(null);
            
            useEffect(() => {
                setDeck(generateDeck());
            }, []);
            
            const handleCardSelect = (card) => {
                const cardsNeeded = spreadType === 'celtic_cross' ? 10 : 3;
                
                if (selectedCards.find(c => c.id === card.id)) {
                    setSelectedCards(selectedCards.filter(c => c.id !== card.id));
                } else if (selectedCards.length < cardsNeeded) {
                    // 随机决定是否逆位
                    const isReversed = Math.random() > 0.7;
                    setSelectedCards([...selectedCards, {
                        ...card,
                        position: isReversed ? 'reversed' : 'upright',
                        reversed: isReversed
                    }]);
                }
            };
            
            const generateReading = () => {
                if (window.TarotEngine && selectedCards.length >= (spreadType === 'celtic_cross' ? 10 : 3)) {
                    try {
                        const result = window.TarotEngine.generateReading(
                            selectedCards,
                            spreadType,
                            topic
                        );
                        setReading(result);
                        setView('reading');
                    } catch (error) {
                        console.error('生成解读失败：', error);
                        alert('解读生成失败，请重试');
                    }
                } else {
                    alert('请先选择足够的牌');
                }
            };
            
            const reset = () => {
                setView('cover');
                setSelectedCards([]);
                setReading(null);
                setDeck(generateDeck());
            };
            
            // 封面页
            if (view === 'cover') {
                return (
                    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
                        <div className="text-center fade-in">
                            <h1 className="text-6xl md:text-8xl font-bold text-white mb-8">
                                🔮 Tarot Pro
                            </h1>
                            <p className="text-2xl md:text-3xl text-white/90 mb-12">
                                专业级塔罗解读系统
                            </p>
                            <button 
                                onClick={() => setView('spread')}
                                className="bg-white/20 backdrop-blur-lg text-white px-12 py-4 rounded-full text-xl font-semibold hover:bg-white/30 transition-all transform hover:scale-105"
                            >
                                开始占卜 ✨
                            </button>
                        </div>
                    </div>
                );
            }
            
            // 牌阵选择页
            if (view === 'spread') {
                return (
                    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-4xl w-full fade-in">
                            <h2 className="text-5xl font-bold text-white text-center mb-12">选择牌阵</h2>
                            
                            <div className="grid md:grid-cols-2 gap-8 mb-12">
                                <div 
                                    onClick={() => setSpreadType('three_card')}
                                    className={`bg-white/10 backdrop-blur-lg p-8 rounded-3xl cursor-pointer transition-all ${
                                        spreadType === 'three_card' ? 'ring-4 ring-yellow-400 transform scale-105' : 'hover:bg-white/20'
                                    }`}
                                >
                                    <div className="text-6xl mb-4 text-center">🃏</div>
                                    <h3 className="text-3xl font-bold text-white text-center mb-4">三张牌阵</h3>
                                    <p className="text-white/80 text-center">过去 · 现在 · 未来</p>
                                    <p className="text-white/60 text-center mt-4 text-sm">快速解读，适合日常占卜</p>
                                </div>
                                
                                <div 
                                    onClick={() => setSpreadType('celtic_cross')}
                                    className={`bg-white/10 backdrop-blur-lg p-8 rounded-3xl cursor-pointer transition-all ${
                                        spreadType === 'celtic_cross' ? 'ring-4 ring-yellow-400 transform scale-105' : 'hover:bg-white/20'
                                    }`}
                                >
                                    <div className="text-6xl mb-4 text-center">🏆</div>
                                    <h3 className="text-3xl font-bold text-white text-center mb-4">凯尔特十字</h3>
                                    <p className="text-white/80 text-center">全维度深度解读</p>
                                    <p className="text-white/60 text-center mt-4 text-sm">10张牌，适合重要决策</p>
                                </div>
                            </div>
                            
                            <div className="bg-white/10 backdrop-blur-lg p-6 rounded-3xl mb-8">
                                <h3 className="text-2xl font-bold text-white mb-4 text-center">占卜类型</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {[
                                        { value: 'love', label: '💕 感情', emoji: '💕' },
                                        { value: 'career', label: '💼 事业', emoji: '💼' },
                                        { value: 'finance', label: '💰 财运', emoji: '💰' },
                                        { value: 'general', label: '🌟 综合', emoji: '🌟' }
                                    ].map(t => (
                                        <button
                                            key={t.value}
                                            onClick={() => setTopic(t.value)}
                                            className={`p-4 rounded-xl transition-all ${
                                                topic === t.value 
                                                    ? 'bg-yellow-400 text-purple-900 font-bold transform scale-105' 
                                                    : 'bg-white/20 text-white hover:bg-white/30'
                                            }`}
                                        >
                                            {t.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex justify-center gap-4">
                                <button 
                                    onClick={() => setView('cover')}
                                    className="bg-white/20 backdrop-blur-lg text-white px-8 py-3 rounded-full hover:bg-white/30 transition-all"
                                >
                                    返回
                                </button>
                                <button 
                                    onClick={() => setView('draw')}
                                    className="bg-yellow-400 text-purple-900 px-12 py-3 rounded-full font-bold hover:bg-yellow-300 transition-all transform hover:scale-105"
                                >
                                    开始抽牌 →
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            // 抽牌页
            if (view === 'draw') {
                const cardsNeeded = spreadType === 'celtic_cross' ? 10 : 3;
                
                return (
                    <div className="relative z-10 min-h-screen p-4 py-8">
                        <div className="max-w-6xl mx-auto fade-in">
                            <div className="text-center mb-8">
                                <h2 className="text-4xl font-bold text-white mb-4">
                                    {spreadType === 'celtic_cross' ? '🏆 凯尔特十字牌阵' : '🃏 三张牌阵'}
                                </h2>
                                <p className="text-xl text-white/80">
                                    已选择 {selectedCards.length}/{cardsNeeded} 张牌
                                </p>
                            </div>
                            
                            <div className="grid grid-cols-4 md:grid-cols-8 lg:grid-cols-10 gap-3 mb-8">
                                {deck.slice(0, 40).map(card => (
                                    <div
                                        key={card.id}
                                        onClick={() => handleCardSelect(card)}
                                        className={`card-item bg-white/20 backdrop-blur-lg p-3 rounded-xl text-center ${
                                            selectedCards.find(c => c.id === card.id) ? 'selected' : ''
                                        }`}
                                    >
                                        <div className="text-3xl mb-2">🎴</div>
                                        <div className="text-xs text-white font-semibold truncate">{card.name}</div>
                                    </div>
                                ))}
                            </div>
                            
                            {selectedCards.length > 0 && (
                                <div className="bg-white/10 backdrop-blur-lg p-6 rounded-3xl mb-8">
                                    <h3 className="text-2xl font-bold text-white mb-4 text-center">已选择的牌</h3>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        {selectedCards.map((card, index) => (
                                            <div key={card.id} className="bg-white/20 p-4 rounded-xl text-center">
                                                <div className="text-4xl mb-2">
                                                    {card.position === 'reversed' ? '🔄' : '🎴'}
                                                </div>
                                                <div className="text-white font-semibold">{card.name}</div>
                                                <div className="text-xs text-white/60 mt-1">
                                                    {card.position === 'reversed' ? '逆位' : '正位'}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            <div className="flex justify-center gap-4">
                                <button 
                                    onClick={() => setView('spread')}
                                    className="bg-white/20 backdrop-blur-lg text-white px-8 py-3 rounded-full hover:bg-white/30 transition-all"
                                >
                                    返回
                                </button>
                                <button 
                                    onClick={generateReading}
                                    disabled={selectedCards.length < cardsNeeded}
                                    className={`px-12 py-3 rounded-full font-bold transition-all transform ${
                                        selectedCards.length >= cardsNeeded
                                            ? 'bg-yellow-400 text-purple-900 hover:bg-yellow-300 hover:scale-105'
                                            : 'bg-gray-400 text-gray-700 cursor-not-allowed'
                                    }`}
                                >
                                    生成解读 ✨
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            // 解读结果页
            if (view === 'reading' && reading) {
                return (
                    <div className="relative z-10 min-h-screen p-4 py-8">
                        <div className="max-w-4xl mx-auto fade-in">
                            {/* 标题 */}
                            <div className="text-center mb-8">
                                <h1 className="text-5xl font-bold text-white mb-4">{reading.title}</h1>
                                <p className="text-xl text-white/80">
                                    {reading.topic === 'love' ? '💕 感情' : 
                                     reading.topic === 'career' ? '💼 事业' : 
                                     reading.topic === 'finance' ? '💰 财运' : '🌟 综合'} 解读
                                </p>
                            </div>
                            
                            {/* 能量状态警告 */}
                            {reading.reversedAnalysis.needsWarning && (
                                <div className="bg-red-500/20 backdrop-blur-lg border-2 border-red-400 p-6 rounded-3xl mb-8 pulse-warning">
                                    <div className="text-center">
                                        <div className="text-5xl mb-4">⚠️</div>
                                        <h3 className="text-3xl font-bold text-white mb-2">
                                            {reading.reversedAnalysis.energyStatus}
                                        </h3>
                                        <p className="text-white/90 text-lg">
                                            逆位牌数：{reading.reversedAnalysis.reversedCount}/{reading.reversedAnalysis.totalCount} 
                                            ({reading.reversedAnalysis.percentage}%)
                                        </p>
                                    </div>
                                </div>
                            )}
                            
                            {/* 正常能量状态 */}
                            {!reading.reversedAnalysis.needsWarning && (
                                <div className="bg-white/10 backdrop-blur-lg p-6 rounded-3xl mb-8 text-center">
                                    <h3 className="text-2xl font-bold text-white mb-2">
                                        {reading.reversedAnalysis.energyStatus}
                                    </h3>
                                    <p className="text-white/80">
                                        逆位牌数：{reading.reversedAnalysis.reversedCount}/{reading.reversedAnalysis.totalCount}
                                    </p>
                                </div>
                            )}
                            
                            {/* 三张牌阵解读 */}
                            {reading.spreadType === 'three_card' && (
                                <div className="space-y-6">
                                    {['past', 'present', 'future'].map((timeframe, index) => {
                                        const pos = reading.positions[timeframe];
                                        const emojis = { past: '📜', present: '⚡', future: '🌟' };
                                        const titles = { past: '过去', present: '现在', future: '未来' };
                                        
                                        return (
                                            <div key={timeframe} className={`bg-white/10 backdrop-blur-lg p-8 rounded-3xl ${pos.isReversed ? 'border-l-4 border-red-400' : ''}`}>
                                                <h3 className="text-3xl font-bold text-white mb-4">
                                                    {emojis[timeframe]} {titles[timeframe]} - {pos.card}
                                                    {pos.isReversed && <span className="text-red-400 ml-2">（逆位）</span>}
                                                </h3>
                                                {pos.interpretation && (
                                                    <div className="text-white/90 text-lg space-y-3">
                                                        {pos.interpretation.short && (
                                                            <p><strong>概述：</strong>{pos.interpretation.short}</p>
                                                        )}
                                                        {pos.interpretation.energy && (
                                                            <p><strong>能量：</strong>{pos.interpretation.energy}</p>
                                                        )}
                                                        {pos.interpretation.situation && (
                                                            <p><strong>情况：</strong>{pos.interpretation.situation}</p>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                            
                            {/* 凯尔特十字解读 */}
                            {reading.spreadType === 'celtic_cross' && reading.analysis && (
                                <div className="space-y-6">
                                    {/* 核心矛盾 */}
                                    <div className="bg-white/10 backdrop-blur-lg p-8 rounded-3xl">
                                        <h3 className="text-3xl font-bold text-white mb-4">
                                            {reading.analysis.coreConflict.title}
                                        </h3>
                                        <p className="text-white/90 text-lg mb-4 leading-relaxed">
                                            {reading.analysis.coreConflict.analysis}
                                        </p>
                                        <div className="bg-yellow-400/20 border-l-4 border-yellow-400 p-4 rounded-lg">
                                            <p className="text-white font-semibold">
                                                💝 {reading.analysis.coreConflict.gentle}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {/* 心理根源 */}
                                    <div className="bg-white/10 backdrop-blur-lg p-8 rounded-3xl">
                                        <h3 className="text-3xl font-bold text-white mb-4">
                                            {reading.analysis.psychological.title}
                                        </h3>
                                        <p className="text-white/90 text-lg mb-4 leading-relaxed">
                                            {reading.analysis.psychological.analysis}
                                        </p>
                                        <div className="bg-yellow-400/20 border-l-4 border-yellow-400 p-4 rounded-lg">
                                            <p className="text-white font-semibold">
                                                💝 {reading.analysis.psychological.gentle}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {/* 外部环境 */}
                                    <div className="bg-white/10 backdrop-blur-lg p-8 rounded-3xl">
                                        <h3 className="text-3xl font-bold text-white mb-4">
                                            {reading.analysis.environment.title}
                                        </h3>
                                        <p className="text-white/90 text-lg mb-4 leading-relaxed">
                                            {reading.analysis.environment.analysis}
                                        </p>
                                        <div className="bg-yellow-400/20 border-l-4 border-yellow-400 p-4 rounded-lg">
                                            <p className="text-white font-semibold">
                                                💝 {reading.analysis.environment.gentle}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {/* 最终预测 */}
                                    <div className="bg-white/10 backdrop-blur-lg p-8 rounded-3xl">
                                        <h3 className="text-3xl font-bold text-white mb-4">
                                            {reading.analysis.finalOutcome.title}
                                        </h3>
                                        <p className="text-white/90 text-lg mb-4 leading-relaxed">
                                            {reading.analysis.finalOutcome.analysis}
                                        </p>
                                        <div className="bg-yellow-400/20 border-l-4 border-yellow-400 p-4 rounded-lg">
                                            <p className="text-white font-semibold">
                                                💝 {reading.analysis.finalOutcome.gentle}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* 底部按钮 */}
                            <div className="flex justify-center gap-4 mt-12">
                                <button 
                                    onClick={reset}
                                    className="bg-white/20 backdrop-blur-lg text-white px-12 py-4 rounded-full text-lg font-semibold hover:bg-white/30 transition-all"
                                >
                                    重新开始 🔄
                                </button>
                            </div>
                            
                            <div className="text-center text-white/60 mt-8">
                                <p className="text-lg">✨ 愿塔罗的智慧为你指引方向 ✨</p>
                            </div>
                        </div>
                    </div>
                );
            }
            
            return null;
        };
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
