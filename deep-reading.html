<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>塔罗深度解读</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./assets/enhanced-tarot-data.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap');
    body {
      margin: 0;
      background: linear-gradient(135deg, #0d0e1a 0%, #1a1b3a 50%, #0d0e1a 100%);
      background-attachment: fixed;
      font-family: 'Cormorant Garamond', serif;
    }
    
    .deep-insight-panel {
      background: linear-gradient(135deg, rgba(26, 27, 58, 0.95) 0%, rgba(13, 14, 26, 0.98) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(247, 231, 206, 0.15);
      animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .wisdom-card {
      background: rgba(255, 255, 255, 0.03);
      border-left: 3px solid;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .wisdom-card.jungian { border-left-color: #9d85c4; }
    .wisdom-card.symbol { border-left-color: #f7e7ce; }
    .wisdom-card.book { border-left-color: #7b68ee; }
  </style>
</head>
<body class="min-h-screen text-[#F7E7CE]">
  <div id="root"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cardId = Number.parseInt(params.get('card') || '0', 10);
    const isReversed = params.get('reversed') === 'true';
    const enhanced = window.ENHANCED_MAJOR_ARCANA?.[cardId] || {};

    const app = document.getElementById('root');
    app.innerHTML = `
      <div class="min-h-screen p-6 md:p-16">
        <a href="index.html" class="inline-block mb-8 text-[#F7E7CE]/60 hover:text-[#F7E7CE] transition-colors tracking-[0.3em] text-xs uppercase">
          ← 返回主页
        </a>

        <div class="max-w-5xl mx-auto">
          <div class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-light tracking-[0.3em] text-[#F7E7CE] mb-4">
              ${enhanced.name || '愚者'}
            </h1>
            <p class="text-xl text-[#9d85c4] italic tracking-wider">
              ${enhanced.nameEn || 'The Fool'}
            </p>
            <div class="mt-4 inline-block px-6 py-2 rounded-full border border-[#F7E7CE]/30 bg-[#F7E7CE]/5">
              <span class="text-sm tracking-[0.3em] text-[#F7E7CE]">
                ${isReversed ? '逆位 REVERSED' : '正位 UPRIGHT'}
              </span>
            </div>
          </div>

          <!-- 荣格原型分析 -->
          ${enhanced.jungian ? `
          <div class="deep-insight-panel rounded-3xl p-8 md:p-12 mb-8">
            <h2 class="text-2xl font-light tracking-[0.4em] text-[#9d85c4] mb-6 flex items-center gap-3">
              <span class="text-3xl">🧠</span>
              荣格原型分析
            </h2>
            <h3 class="text-xl text-[#F7E7CE] mb-4 tracking-wide">
              ${enhanced.jungian.archetype}
            </h3>
            <p class="text-[#e5e7eb] leading-relaxed text-base md:text-lg">
              ${enhanced.jungian.description}
            </p>
          </div>
          ` : ''}

          <!-- 符号系统解构 -->
          ${enhanced.symbolism ? `
          <div class="deep-insight-panel rounded-3xl p-8 md:p-12 mb-8">
            <h2 class="text-2xl font-light tracking-[0.4em] text-[#f7e7ce] mb-6 flex items-center gap-3">
              <span class="text-3xl">🔮</span>
              符号系统解构
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${Object.entries(enhanced.symbolism).map(([key, value]) => `
                <div class="wisdom-card symbol">
                  <p class="text-[#F7E7CE] text-sm tracking-wide mb-2">
                    ${value.split(/[：——]/)[0]}
                  </p>
                  <p class="text-[#e5e7eb]/80 text-sm leading-relaxed">
                    ${value}
                  </p>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          <!-- 生活情境指引 -->
          ${enhanced.deepInsights ? `
          <div class="deep-insight-panel rounded-3xl p-8 md:p-12 mb-8">
            <h2 class="text-2xl font-light tracking-[0.4em] text-[#7b68ee] mb-6 flex items-center gap-3">
              <span class="text-3xl">💫</span>
              生活情境指引
            </h2>
            
            <div class="wisdom-card jungian">
              <h3 class="text-[#F7E7CE] text-base tracking-wide mb-3 flex items-center gap-2">
                <span>❤️</span> 爱情关系
              </h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed">
                ${enhanced.deepInsights.love}
              </p>
            </div>

            <div class="wisdom-card jungian">
              <h3 class="text-[#F7E7CE] text-base tracking-wide mb-3 flex items-center gap-2">
                <span>💼</span> 事业发展
              </h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed">
                ${enhanced.deepInsights.career}
              </p>
            </div>

            <div class="wisdom-card jungian">
              <h3 class="text-[#F7E7CE] text-base tracking-wide mb-3 flex items-center gap-2">
                <span>🌟</span> 心灵成长
              </h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed">
                ${enhanced.deepInsights.spiritual}
              </p>
            </div>
          </div>
          ` : ''}

          <!-- 经典塔罗著作的智慧 -->
          ${enhanced.bookWisdom ? `
          <div class="deep-insight-panel rounded-3xl p-8 md:p-12 mb-8">
            <h2 class="text-2xl font-light tracking-[0.4em] text-[#f7e7ce] mb-6 flex items-center gap-3">
              <span class="text-3xl">📚</span>
              经典塔罗著作的智慧
            </h2>
            
            <div class="wisdom-card book">
              <h3 class="text-[#F7E7CE] tracking-wide mb-3">《塔罗逆位精解》</h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed italic">
                ${enhanced.bookWisdom.reversed}
              </p>
            </div>

            <div class="wisdom-card book">
              <h3 class="text-[#F7E7CE] tracking-wide mb-3">《塔罗葵花宝典》</h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed italic">
                ${enhanced.bookWisdom.greer}
              </p>
            </div>

            <div class="wisdom-card book">
              <h3 class="text-[#F7E7CE] tracking-wide mb-3">《78度的智慧》</h3>
              <p class="text-[#e5e7eb]/90 leading-relaxed italic">
                ${enhanced.bookWisdom.pollack}
              </p>
            </div>
          </div>
          ` : ''}

          <!-- 自由意志提醒 -->
          ${enhanced.freeWill ? `
          <div class="deep-insight-panel rounded-3xl p-10 md:p-14 mb-12 bg-gradient-to-br from-[#9d85c4]/20 to-[#7b68ee]/10 border-[#9d85c4]/30">
            <h2 class="text-2xl font-light tracking-[0.4em] text-[#F7E7CE] mb-6 text-center flex items-center justify-center gap-3">
              <span class="text-3xl">🕊️</span>
              你的选择，你的力量
            </h2>
            <p class="text-[#F7E7CE]/95 text-lg leading-relaxed text-center italic">
              ${enhanced.freeWill}
            </p>
          </div>
          ` : ''}

          <div class="text-center pb-12">
            <a href="index.html" class="inline-block px-12 py-4 rounded-full border border-[#F7E7CE]/40 hover:border-[#F7E7CE] hover:shadow-[0_0_30px_rgba(247,231,206,0.3)] transition-all duration-500 tracking-[0.4em] text-sm uppercase bg-[#F7E7CE]/5 backdrop-blur-md">
              返回主页
            </a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
